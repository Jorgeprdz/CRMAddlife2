<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" ...>
    <title>CRM Addlife Professional</title>

    ...
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRM Addlife Professional</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" id="meta-theme-color" content="#F2F2F7">
    <!-- Supabase: cambiado a unpkg por mayor estabilidad -->
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <!-- DEBUG: Eruda consola móvil — QUITAR ANTES DE PRODUCCIÓN -->
    <script src="//cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</head>
<body>

    <!-- Header -->
    <header class="app-header" id="main-header">
        <div style="display:flex; align-items:center; gap:10px;">
            <img id="header-avatar" src="" style="width:36px; height:36px; border-radius:50%; display:none; border:2px solid var(--accent); object-fit:cover;">
            <div style="display:flex; flex-direction:column;">
                <span id="header-greeting" style="font-size:11px; color:var(--text-secondary); font-weight:500;">CRM Addlife</span>
                <strong id="header-name" style="font-size:15px; color:var(--text-primary);">Inicia sesión</strong>
            </div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
            <div class="ios-toggle-wrap">
                <label class="ios-toggle">
                    <input type="checkbox" id="theme-toggle">
                    <div class="ios-toggle-track"></div>
                    <div class="ios-toggle-thumb"></div>
                </label>
            </div>
        </div>
    </header>

    <!-- Contenido principal -->
    <main id="app-content"></main>

    <!-- Nav inferior -->
    <nav id="main-sidebar" class="bottom-nav" style="display:none;">
        <button class="nav-btn active" data-target="dashboard">
            <span class="icon">🏠</span><span class="label">Inicio</span>
        </button>
        <button class="nav-btn" data-target="prospeccion">
            <span class="icon">🎯</span><span class="label">Embudo</span>
        </button>
        <button class="nav-btn" data-target="referidos">
            <span class="icon">👥</span><span class="label">Directorio</span>
        </button>
        <button class="nav-btn" data-target="actividad">
            <span class="icon">📈</span><span class="label">Actividad</span>
        </button>
        <button class="nav-btn" data-target="cartera">
            <span class="icon">💼</span><span class="label">Cartera</span>
        </button>
        <button class="nav-btn" data-target="comisiones">
            <span class="icon">💰</span><span class="label">Finanzas</span>
        </button>
        <!-- Botón cerrar sesión -->
        <button class="nav-btn nav-btn-logout" id="btn-cerrar-sesion" style="color:var(--danger);">
            <span class="icon">🚪</span><span class="label">Salir</span>
        </button>
    </nav>

    <!-- Chat bubble flotante -->
    <div id="ai-chat-bubble" class="chat-bubble-trigger" style="display:none;">💬</div>

    <!-- Ventana chat -->
    <div id="ai-chat-window" class="chat-window-modal">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:8px;">
                <span style="font-size:18px;">🧠</span>
                <div style="display:flex; flex-direction:column;">
                    <span style="font-size:13px; font-weight:600;">Asistente Comercial</span>
                    <span style="font-size:10px; color:var(--success);">Con datos reales de tu cartera</span>
                </div>
            </div>
            <div id="close-chat" class="chat-close-btn">✕</div>
        </div>
        <div id="ai-chat-messages" class="chat-messages-container">
            <div class="msg-row ia-row">
                <div class="chat-bubble ia-bubble">
                    Hola 👋 Soy tu asistente con acceso a tus datos reales. Pregúntame sobre tus comisiones del mes, renovaciones pendientes, qué te falta para el bono, o estrategias de venta.
                </div>
            </div>
        </div>
        <div class="chat-input-area">
            <input id="ai-chat-input" placeholder="Pregunta sobre tu negocio..." autocomplete="off">
            <button id="ai-chat-send" class="chat-send-btn">↑</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () =>
                navigator.serviceWorker.register('./service-worker.js', { scope: './' }).catch(console.error)
            );
        }
    </script>
</body>
</html>
